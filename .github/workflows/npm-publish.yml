name: Publish to npm

# Triggers on any tag matching v* (v0.1.0, v1.0.0-beta.1, etc.).
# Use:  git tag v0.2.0 && git push --tags
#
# Required secrets (see README in this workflow's repo):
#   NPM_TOKEN   Automation token from https://www.npmjs.com/settings/<user>/tokens
#               Scope: @dualnova/*  →  Read and write
#               2FA requirement: "Bypass" (Automation tokens bypass 2FA by design)

on:
  push:
    tags:
      - 'v*'

# Required for npm provenance attestation (https://docs.npmjs.com/generating-provenance-statements)
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "✓ Publishing version $PKG_VERSION"

      - name: Publish to npm with provenance
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
